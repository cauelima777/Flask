<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ entrada.titulo }} — Diário</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Lora', serif;
            --bg-light: radial-gradient(circle at top left, #f8fafc, #ffffff);
            --bg-dark: #0f172a;
            --text-muted: #64748b;
        }

        [data-theme="dark"] {
            --background-color: var(--bg-dark);
            --text-muted: #94a3b8;
        }

        body {
            font-family: var(--font-main);
            background: var(--background-color);
            background-attachment: fixed;
            transition: background 0.4s ease;
        }

        .view-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* Navegação sutil */
        .view-nav {
            margin-bottom: 5rem;
        }

        .back-link {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* Tipografia do Cabeçalho */
        header {
            margin-bottom: 4rem;
        }

        .view-date {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--primary);
            font-weight: 800;
            display: block;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem); /* Responsivo */
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.05;
            margin: 0;
            color: var(--h1-color);
        }

        /* Estilo do Conteúdo - Foco em Leitura */
        .view-content {
            font-family: var(--font-serif); /* Fonte serifada para o texto longo */
            font-size: 1.35rem;
            line-height: 1.85;
            color: var(--color);
            opacity: 0.95;
        }

        /* Estilizando parágrafos e elementos dentro do conteúdo rico */
        .view-content p { margin-bottom: 2rem; }
        .view-content blockquote {
            border-left: 4px solid var(--primary);
            font-style: italic;
            padding-left: 1.5rem;
            margin: 2.5rem 0;
            color: var(--text-muted);
        }

        /* Rodapé Elegante */
        footer {
            margin-top: 8rem;
            padding-top: 3rem;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        [data-theme="dark"] footer {
            border-top-color: rgba(255,255,255,0.05);
        }

        .action-group {
            display: flex;
            gap: 24px;
        }

        .btn-action {
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .btn-action:hover {
            color: var(--primary);
        }

        /* Botão de Tema "Glassmorphism" */
        #theme-toggle {
            position: fixed;
            bottom: 40px; /* Mudei para baixo para não poluir o topo */
            right: 40px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        [data-theme="dark"] #theme-toggle {
            background: rgba(15, 23, 42, 0.7);
            border-color: rgba(255,255,255,0.1);
        }

        #theme-toggle:hover {
            transform: scale(1.1) rotate(12deg);
        }

        /* Ajustes Mobile */
        @media (max-width: 600px) {
            .view-container { padding: 40px 20px; }
            h1 { font-size: 2.5rem; }
            footer { flex-direction: column; gap: 20px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div id="theme-toggle" title="Alternar tema" onclick="toggleTheme()">
        <span id="theme-icon" style="font-size: 1.2rem;">🌙</span>
    </div>

    <main class="view-container">
        <nav class="view-nav">
            <a href="{{ url_for('index') }}" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Estante
            </a>
        </nav>

        <header>
            <span class="view-date">{{ entrada.data_criacao.strftime('%d de %B, %Y') }}</span>
            <h1>{{ entrada.titulo }}</h1>
        </header>

        <article class="view-content">
            {{ entrada.conteudo|safe }}
        </article>

        <footer>
            <div class="action-group">
                <a href="{{ url_for('editar', id=entrada.id) }}" class="btn-action">Editar</a>
                <a href="#" class="btn-action" style="color: #f87171;" 
                   onclick="if(confirm('Apagar esta memória para sempre?')) location.href='{{ url_for('deletar', id=entrada.id) }}'">
                   Excluir
                </a>
            </div>
            <span style="font-size: 0.8rem; color: var(--text-muted); font-style: italic;">
                Escrito por você.
            </span>
        </footer>
    </main>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('journal-theme', newTheme);
            updateIcon(newTheme);
        }

        function updateIcon(theme) {
            document.getElementById('theme-icon').innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        const saved = localStorage.getItem('journal-theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        updateIcon(saved);
    </script>
</body>
</html>
