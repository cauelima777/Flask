<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrever - Diário</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            transition: background 0.4s ease;
        }

        .write-container {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px 120px;
        }

        /* Título sem bordas e sem bugs de foco */
        .title-input {
            font-size: clamp(2rem, 5vw, 3rem) !important;
            font-weight: 800 !important;
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            margin: 20px 0 30px 0 !important;
            outline: none !important;
            box-shadow: none !important;
            color: var(--h1-color) !important;
            height: auto !important;
            width: 100%;
        }

        /* Estilização do Editor Quill para evitar conflitos */
        #editor-wrapper {
            background: transparent;
            border-radius: 12px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid rgba(120, 120, 120, 0.1) !important;
            background: var(--background-color);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 15px 0 !important;
        }

        .ql-container.ql-snow {
            border: none !important;
            font-size: 1.2rem;
            flex-grow: 1;
        }

        .ql-editor {
            padding: 20px 0 !important;
            min-height: 400px;
            color: var(--color);
        }

        /* Fix para Dark Mode no Quill */
        [data-theme="dark"] .ql-snow .ql-stroke { stroke: #e2e8f0; }
        [data-theme="dark"] .ql-snow .ql-fill { fill: #e2e8f0; }
        [data-theme="dark"] .ql-snow .ql-picker { color: #e2e8f0; }
        [data-theme="dark"] .ql-editor.ql-blank::before { color: rgba(255,255,255,0.2); font-style: normal; }

        /* Barra Inferior de Ação */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(var(--card-background-color), 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(120, 120, 120, 0.1);
            padding: 20px 0;
            z-index: 100;
        }

        .action-content {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .btn-save {
            background: var(--primary);
            border: none;
            padding: 10px 35px;
            border-radius: 50px;
            font-weight: 700;
            margin: 0;
            width: auto;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        /* Theme Toggle */
        #theme-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px;
            background: rgba(120, 120, 120, 0.1);
            border: 1px solid rgba(120, 120, 120, 0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span>
    </div>

    <main class="write-container">
        <header>
            <a href="{{ url_for('index') }}" class="secondary" style="text-decoration: none; font-size: 0.9rem; font-weight: 600;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Cancelar
            </a>
        </header>

        <form method="POST" id="diario-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="titulo" class="title-input" placeholder="Título da memória..." required autocomplete="off" autofocus>

            <div id="editor-wrapper">
                <div id="editor"></div>
            </div>
            
            <input type="hidden" name="conteudo" id="conteudo-db">

            <div class="action-bar">
                <div class="action-content">
                    <span style="font-size: 0.8rem; opacity: 0.5; font-weight: 600;">O que você está sentindo?</span>
                    <button type="submit" class="btn-save">Salvar Memória</button>
                </div>
            </div>
        </form>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Inicializa o Quill com ferramentas essenciais
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Escreva seus pensamentos mais profundos...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    ['blockquote', 'link'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        // Garante que o conteúdo seja passado para o Flask antes do envio
        const form = document.getElementById('diario-form');
        form.addEventListener('submit', function(e) {
            const conteudoInput = document.getElementById('conteudo-db');
            const html = quill.root.innerHTML;
            
            // Validação simples para não salvar vazio
            if (quill.getText().trim().length === 0) {
                alert("Escreva algo antes de salvar!");
                e.preventDefault();
                return;
            }
            
            conteudoInput.value = html;
        });

        // Lógica de Tema
        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('journal-theme', newTheme);
            updateIcon(newTheme);
        }

        function updateIcon(theme) {
            document.getElementById('theme-icon').innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        // Carrega tema salvo
        const savedTheme = localStorage.getItem('journal-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);
    </script>
</body>
</html>
