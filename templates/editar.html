<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrever Memória - Diário</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #6366f1; 
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            font-family: var(--font-family);
            background: var(--background-color); 
            transition: background 0.4s ease;
            margin: 0;
        }

        .editor-container {
            max-width: 850px;
            margin: 0 auto;
            padding: 60px 20px 120px; /* Espaço para a barra inferior */
        }

        /* --- TÍTULO MINIMALISTA --- */
        .titulo-input {
            font-size: clamp(2rem, 5vw, 3.5rem) !important;
            font-weight: 800 !important;
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            margin-bottom: 2rem !important;
            outline: none !important;
            box-shadow: none !important;
            color: var(--h1-color) !important;
            letter-spacing: -2px;
            height: auto !important;
        }

        .titulo-input::placeholder { opacity: 0.2; }

        /* --- AJUSTES DO QUILL (MODO FOCO) --- */
        #editor {
            font-family: var(--font-family);
            font-size: 1.25rem;
            border: none !important;
            min-height: 50vh;
            color: var(--color);
        }

        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid rgba(120, 120, 120, 0.1) !important;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--background-color);
            padding: 15px 0 !important;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* Corrigindo o bug do seletor "Normal" azul */
        .ql-snow .ql-picker.ql-header {
            background: transparent !important;
            border: 1px solid rgba(120, 120, 120, 0.2) !important;
            border-radius: 6px;
            color: var(--color) !important;
        }

        .ql-snow .ql-picker-label { color: var(--color) !important; }

        .ql-container.ql-snow { border: none !important; }
        .ql-editor { padding: 0 !important; }
        .ql-editor.ql-blank::before { left: 0 !important; font-style: normal !important; opacity: 0.3; }

        /* Cores Dark Mode para os ícones */
        [data-theme="dark"] .ql-snow .ql-stroke { stroke: #94a3b8; }
        [data-theme="dark"] .ql-snow .ql-fill { fill: #94a3b8; }
        [data-theme="dark"] .ql-snow .ql-picker { color: #94a3b8; }

        /* --- BARRA DE AÇÃO INFERIOR FIXA --- */
        .bottom-action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(var(--background-color), 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 0;
            border-top: 1px solid rgba(120, 120, 120, 0.1);
            z-index: 1000;
        }

        .action-content {
            max-width: 850px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-save {
            background: var(--primary);
            border: none;
            border-radius: 100px;
            padding: 12px 40px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            margin: 0;
            width: auto;
        }

        .btn-cancel {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* --- THEME TOGGLE --- */
        #theme-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px;
            background: rgba(120, 120, 120, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1100;
        }

        @media (max-width: 600px) {
            .editor-container { padding-top: 40px; }
            .action-content { gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span>
    </div>

    <main class="editor-container">
        <form method="POST" id="diary-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="titulo" class="titulo-input" 
                   placeholder="Título da memória..." 
                   value="{{ entrada.titulo if entrada else '' }}" required autocomplete="off" autofocus>
            
            <div id="editor">{{ entrada.conteudo|safe if entrada else '' }}</div>
            
            <input type="hidden" name="conteudo" id="conteudo-input">

            <div class="bottom-action-bar">
                <div class="action-content">
                    <a href="{{ url_for('index') }}" class="btn-cancel">Descartar rascunho</a>
                    <button type="submit" class="btn-save">Eternizar Memória</button>
                </div>
            </div>
        </form>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'O que está passando pela sua mente agora?',
            modules: {
                toolbar: [
                  
                    ['bold', 'italic', 'underline', 'blockquote'],
                    [{'list': 'ordered'}, {'list': 'bullet'}],
                    ['link', 'clean']
                ]
            }
        });

        var form = document.getElementById('diary-form');
        form.onsubmit = function(e) {
            if (quill.getText().trim().length === 0) {
                alert("O diário não aceita páginas em branco. Escreva algo!");
                e.preventDefault();
                return false;
            }
            document.getElementById('conteudo-input').value = quill.root.innerHTML;
        };

        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('journal-theme', newTheme);
            updateIcon(newTheme);
        }

        function updateIcon(theme) {
            document.getElementById('theme-icon').innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        const savedTheme = localStorage.getItem('journal-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);
    </script>
</body>
</html>
