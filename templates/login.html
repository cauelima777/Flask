<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 40px; border-radius: 20px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="container">
    <div class="login-box">
        <h2 style="text-align: center;">🔐 Acesso Restrito</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Usuário</label>
            <input type="text" name="username" required>
            <label>Senha</label>
            <input type="password" name="password" required>
            <button type="submit" style="width: 100%; border-radius: 50px;">Entrar no Diário</button>
        </form>
    </div>
</body>
</html>
